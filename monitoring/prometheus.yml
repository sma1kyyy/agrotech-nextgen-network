# monitoring/prometheus.yml
# собирает метрики со всех сервисов стенда
#
# в стенде сейчас реально доступны метрики:
#   prometheus сам (localhost:9090)
#   node-exporter (host:9100)
#   onos через rest api /onos/v1/metrics (требует basic auth onos:rocks)
#
# отдельные экспортеры (wireguard, frr, blackbox, nginx_stub) не подняты —
# чтобы не плодить лишние контейнеры в учебном стенде. при желании их можно
# добавить и расширить prometheus.yml ниже.

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s

  external_labels:
    project: "agrotech-sdn"
    env:     "lab"

rule_files: []

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:

  # сам prometheus
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # хост-машина (cpu, ram, disk, network)
  # node-exporter в network_mode: host, поэтому из контейнера prometheus
  # ходим к нему через docker bridge gateway 172.17.0.1
  # (host.docker.internal на linux не резолвится без extra_hosts)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["172.17.0.1:9100"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "host-machine"
