! frr/frr.conf конфигурация маршрутизатора филиала
!
! топология стенда:
!   eth0 — интерфейс в сети branch  (10.0.2.1/24)   основной аплинк
!   eth1 — интерфейс в сети monitoring (10.0.99.40) только для метрик
!
! next-hop'ы к цод:
!   10.0.2.31 — контейнер wireguard-branch, который заворачивает
!               трафик в wg-туннель и отдаёт его в цод (10.0.1.0/24)
!   10.0.2.30 — wireguard-сервер цод-стороны (резервный путь:
!               если wireguard-branch упал, можно ходить через
!               сервер напрямую — пакет уйдёт без шифрования,
!               но для лабораторного failover-демо это годится)
!
! имитация sd-wan failover (4g/спутник):
!   маршрут к 10.0.1.0/24 через 10.0.2.31 имеет метрику 10  (основной канал)
!   маршрут к 10.0.1.0/24 через 10.0.2.30 имеет метрику 100 (резервный канал)
!   падение основного канала демонстрируем командой:
!     vtysh -c "configure terminal" -c "no ip route 10.0.1.0/24 10.0.2.31 10"
!   после чего show ip route покажет резерв через 10.0.2.30

frr version 9.1.1
frr defaults traditional
hostname frr-branch
log syslog informational
service integrated-vtysh-config

! интерфейсы

interface eth0
 description "branch lan основной канал к wireguard-branch"
!

interface eth1
 description "uplink в сеть monitoring (метрики prometheus)"
!

interface lo
!

! ip-форвардинг и статические маршруты

ip forwarding

! маршрут к цод через wireguard-branch (метрика 10, основной)
ip route 10.0.1.0/24 10.0.2.31 10

! маршрут к цод через wireguard-сервер (метрика 100, резерв)
ip route 10.0.1.0/24 10.0.2.30 100

! отслеживание доступности next-hop через bfd
! bfd позволяет детектировать отказ за < 1 сек

bfd
 peer 10.0.2.31
  receive-interval 300
  transmit-interval 300
  detect-multiplier 3
  no shutdown
 !
 peer 10.0.2.30
  receive-interval 1000
  transmit-interval 1000
  detect-multiplier 3
  no shutdown
 !
!

! pbr (policy-based routing) — разделение трафика по dscp
!   dscp 48 (cs6, критические iot-данные) → основной канал
!   dscp 34 (af41, видеоконференции)      → основной канал

pbr-map PRIORITY-TRAFFIC seq 10
 match dscp 48
 set nexthop 10.0.2.31
!

pbr-map PRIORITY-TRAFFIC seq 20
 match dscp 34
 set nexthop 10.0.2.31
!

interface eth0
 pbr-policy PRIORITY-TRAFFIC
!

line vty
!
