# agrotech-sdn / docker-compose.yml
# полный стенд: onos, ovs, wireguard, frr, tailscale,
# containernet, prometheus, grafana
# запуск: sudo docker compose up -d

networks:
  # внутренняя сеть цод между onos, ovs и серверами приложений
  datacenter:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.1.0/24

  # сеть филиала frr, ovs-branch, iot/cctv
  branch:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.2.0/24

  # оверлей для мониторинга prometheus/grafana видят все контейнеры
  monitoring:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.99.0/24

volumes:
  onos-data:
  grafana-data:
  prometheus-data:

services:

  # onos — sdn-контроллер цод
  # ui: http://localhost:8181/onos/ui  login: onos / rocks
  onos:
    image: onosproject/onos:2.7-latest
    hostname: onos
    restart: unless-stopped
    environment:
      ONOS_APPS: "drivers,openflow,fwd,proxyarp,lldpprovider,hostprovider"
    ports:
      - "8181:8181"   # onos web ui / rest api
      - "8101:8101"   # onos cli (ssh)
      - "6653:6653"   # openflow 1.3 от ovs-коммутаторов
      - "9876:9876"   # onos cluster
    volumes:
      - onos-data:/root/onos/apache-karaf-4.2.14/data
      - ./onos/config/network-cfg.json:/root/onos/config/network-cfg.json:ro
    networks:
      - datacenter
      - monitoring
      # datacenter:
      #   ipv4_address: 10.0.1.2
      # monitoring:
      #   ipv4_address: 10.0.99.2
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8181/onos/v1/devices",
             "-u", "onos:rocks"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ovs-1 — первый программный коммутатор цод (data plane)
  # подключается к onos через openflow 1.3
  ovs1:
    image: openvswitch/ovs:2.11.2_debian
    container_name: ovs1
    hostname: ovs1
    restart: unless-stopped
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    volumes:
      - /lib/modules:/lib/modules:ro
      - ./ovs/setup.sh:/setup.sh:ro
    networks:
      - datacenter
        # ipv4_address: 10.0.1.10
    depends_on:
      onos:
        condition: service_healthy
    command: >
      bash -c "
        ovsdb-server --remote=punix:/var/run/openvswitch/db.sock
                     --remote=db:Open_vSwitch,Open_vSwitch,manager_options
                     --pidfile --detach &&
        ovs-vsctl --no-wait init &&
        ovs-vswitchd --pidfile --detach &&
        bash /setup.sh ovs1 onos 6653 &&
        tail -f /dev/null
      "

  # ovs-2 второй программный коммутатор цод
  ovs2:
    image: openvswitch/ovs:2.11.2_debian
    container_name: ovs2
    hostname: ovs2
    restart: unless-stopped
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    volumes:
      - /lib/modules:/lib/modules:ro
      - ./ovs/setup.sh:/setup.sh:ro
    networks:
      - datacenter
        # ipv4_address: 10.0.1.11
    depends_on:
      onos:
        condition: service_healthy
    command: >
      bash -c "
        ovsdb-server --remote=punix:/var/run/openvswitch/db.sock
                     --remote=db:Open_vSwitch,Open_vSwitch,manager_options
                     --pidfile --detach &&
        ovs-vsctl --no-wait init &&
        ovs-vswitchd --pidfile --detach &&
        bash /setup.sh ovs2 onos 6653 &&
        tail -f /dev/null
      "

  # app-server симуляция сервера приложений в цод
  # отдаёт /health и /metrics для prometheus
  app-server:
    image: nginx:alpine
    container_name: app-server
    hostname: app-server
    restart: unless-stopped
    volumes:
      - ./app-server/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./app-server/html:/usr/share/nginx/html:ro
    networks:
      datacenter:
        ipv4_address: 10.0.1.20
      monitoring:
        ipv4_address: 10.0.99.20
    ports:
      - "8080:80"

  # wireguard vpn-туннель для филиала (udp 51820)
  wireguard:
    image: linuxserver/wireguard:latest
    container_name: wireguard
    hostname: wireguard
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "Europe/Moscow"
      SERVERURL: "auto"
      SERVERPORT: "51820"
      # peer1 = frr-router филиала
      PEERS: "branch-frr"
      PEERDNS: "auto"
      INTERNAL_SUBNET: "10.13.13.0/24"
      ALLOWEDIPS: "0.0.0.0/0"
      LOG_CONFS: "true"
    volumes:
      - ./wireguard:/config
      - /lib/modules:/lib/modules:ro
    ports:
      - "51820:51820/udp"
    networks:
      - datacenter
      - monitoring
      # datacenter:
      #   ipv4_address: 10.0.1.30
      # monitoring:
      #   ipv4_address: 10.0.99.30
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1

  # frr-branch маршрутизатор филиала с failover 4g/спутник
  frr-branch:
    image: quay.io/frrouting/frr:9.1.1
    container_name: frr-branch
    hostname: frr-branch
    restart: unless-stopped
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_RAWIO
    volumes:
      - ./frr/frr.conf:/etc/frr/frr.conf:ro
      - ./frr/daemons:/etc/frr/daemons:ro
      - ./frr/vtysh.conf:/etc/frr/vtysh.conf:ro
    networks:
      - branch
      - monitoring
      # branch:
      #   ipv4_address: 10.0.2.1
      # monitoring:
      #   ipv4_address: 10.0.99.40
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.forwarding=1

  # ovs-branch — коммутатор в филиале (iot + cctv)
  ovs-branch:
    image: openvswitch/ovs:2.11.2_debian
    container_name: ovs-branch
    hostname: ovs-branch
    restart: unless-stopped
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    volumes:
      - /lib/modules:/lib/modules:ro
      - ./ovs/setup-branch.sh:/setup.sh:ro
    networks:
      - branch
      # branch:
      #   ipv4_address: 10.0.2.10
    depends_on:
      - frr-branch
    command: >
      bash -c "
        ovsdb-server --remote=punix:/var/run/openvswitch/db.sock
                     --remote=db:Open_vSwitch,Open_vSwitch,manager_options
                     --pidfile --detach &&
        ovs-vsctl --no-wait init &&
        ovs-vswitchd --pidfile --detach &&
        bash /setup.sh &&
        tail -f /dev/null
      "

  # iot-sim симулятор iot-датчиков (mqtt → influx/prometheus)
  # генерирует трафик для демонстрации qos
  iot-sim:
    image: eclipse-mosquitto:2.0
    container_name: iot-sim
    hostname: iot-sim
    restart: unless-stopped
    volumes:
      - ./iot/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - branch
        # ipv4_address: 10.0.2.20
    ports:
      - "1883:1883"   # mqtt

  # cctv-sim симулятор rtsp-потока с камер (vlc headless)
  # генерирует udp-трафик для тестирования dscp/qos
  cctv-sim:
    image: linuxserver/ffmpeg:latest
    container_name: cctv-sim
    hostname: cctv-sim
    restart: unless-stopped
    networks:
      - branch
        # ipv4_address: 10.0.2.21
    entrypoint: >
      sh -c "
        sleep 10 &&
        ffmpeg -re -f lavfi -i testsrc=size=1280x720:rate=25
               -vcodec libx264 -preset ultrafast -tune zerolatency
               -f rtp rtp://10.0.2.1:5004 2>/dev/null || true &&
        tail -f /dev/null
      "

  # prometheus сбор метрик со всех сервисов
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    hostname: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - monitoring
        # ipv4_address: 10.0.99.10

  # grafana дашборды и визуализация
  # ui: http://localhost:3000  login: admin / admin
  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    hostname: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_SECURITY_ADMIN_USER: "admin"
      GF_PATHS_PROVISIONING: "/etc/grafana/provisioning"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: "grafana-clock-panel,grafana-piechart-panel"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboard.json:/var/lib/grafana/dashboards/agrotech.json:ro
    ports:
      - "3000:3000"
    networks:
      - monitoring
        # ipv4_address: 10.0.99.11
    depends_on:
      - prometheus

  # node-exporter метрики хост-машины
  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: node-exporter
    hostname: node-exporter
    restart: unless-stopped
    pid: host
    network_mode: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"

  # containernet mininet внутри docker для симуляции топологии
  containernet:
    image: containernet/containernet:latest
    container_name: containernet
    hostname: containernet
    restart: "no"
    privileged: true
    pid: host
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./containernet/topology.py:/topology.py:ro
    environment:
      DISPLAY: ""
    # запускается вручную: docker exec -it containernet python3 /topology.py
    entrypoint: tail -f /dev/null