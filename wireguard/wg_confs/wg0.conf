# wireguard/wg_confs/wg0.conf
# серверная сторона туннеля в цод. слушает udp 51820.
# peer: branch-frr (контейнер wireguard-branch, маршрутизатор филиала).
# файл смонтирован read-only поверх /config/wg_confs/wg0.conf, чтобы образ
# linuxserver/wireguard не мог перезаписать его своим шаблоном.

[Interface]
Address = 10.13.13.1/24
ListenPort = 51820
PrivateKey = oGKTdbdTB8e9Iv/QwQ7U7+d6pZHFh6Vx04HBDSUd7Xo=

# отключаем автоматическое добавление маршрутов wg-quick'ом:
# 10.0.2.0/24 уже добавлен docker-сетью branch, RTNETLINK ругается
Table = off

PostUp = iptables -A FORWARD -i %i -j ACCEPT; iptables -A FORWARD -o %i -j ACCEPT; iptables -t nat -A POSTROUTING -o eth+ -j MASQUERADE
PostDown = iptables -D FORWARD -i %i -j ACCEPT; iptables -D FORWARD -o %i -j ACCEPT; iptables -t nat -D POSTROUTING -o eth+ -j MASQUERADE

[Peer]
# peer = wireguard-branch (linuxserver image игнорирует комментарии в [Peer])
PublicKey = zQCNGoXRv11xaDMTVzuhYIaZhH7oI0DCd3nq8WV9lTo=
PresharedKey = eJ/4ie97D2V3wZzEIg3PnSYV9rFG7nY8pXAuOPqK4mg=
AllowedIPs = 10.13.13.2/32, 10.0.2.0/24
PersistentKeepalive = 25
