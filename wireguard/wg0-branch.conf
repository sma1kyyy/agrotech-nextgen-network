# wireguard/wg0-branch.conf — сторона филиала (контейнер frr-branch)
# адрес 10.13.13.2 в туннельной подсети
# endpoint указывает на контейнер wireguard в сети branch
# (см. docker-compose: wireguard имеет статический ip 10.0.2.30 в сети branch)

[Interface]
# адрес филиала в туннеле
Address = 10.13.13.2/24

# клиент НЕ слушает на 51820 (иначе конфликт с серверным wireguard)
# рандомный исходящий порт назначит ядро
ListenPort = 0

# приватный ключ филиала
# (см. ./wireguard/peer_branch-frr/privatekey-branch-frr)
PrivateKey = IGhnO5D1THqNsSGcUdNWzjXsBl5QEXj8a93xbkaYwlg=

# уменьшаем mtu чтобы вписаться в типичный спутниковый канал (1500 - 80)
MTU = 1380

# маршрутизация через туннель к цод
# wg-quick не любит обратные слэши — пишем одной строкой через `;`
# 10.13.13.0/24 НЕ добавляем — он уже создаётся автоматически из Address
PostUp = ip rule add from 10.0.2.0/24 table 201; ip route add 10.0.1.0/24 dev wg0 table 201
PostDown = ip rule del from 10.0.2.0/24 table 201 || true; ip route del 10.0.1.0/24 dev wg0 table 201 || true

# peer: wireguard-сервер в цод
[Peer]
PublicKey = t0Wa5bhcO1/O0zeAGrV2USCD1T9O81BXB4Mg6oUgniE=
PresharedKey = eJ/4ie97D2V3wZzEIg3PnSYV9rFG7nY8pXAuOPqK4mg=

# endpoint — wireguard-сервер во внутренней сети branch
# (стенд: docker-compose ставит wireguard в сеть branch с ip 10.0.2.30)
Endpoint = 10.0.2.30:51820

# весь трафик к цод и туннельной подсети — через wireguard
AllowedIPs = 10.13.13.0/24, 10.0.1.0/24

# keepalive, чтобы nat-сессия не закрывалась
PersistentKeepalive = 25
