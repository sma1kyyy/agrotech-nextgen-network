! frr/frr.conf конфигурация маршрутизатора филиала
! реализует failover 4g спутник через статические маршруты с разными метриками
! zebra отслеживает доступность nexthop через bfd/icmp и меняет активный маршрут
!
! топология каналов:
!   eth0 — интерфейс 4g-роутера      (10.0.2.254, основной, метрика 10)
!   eth1 — интерфейс спутникового GW (10.0.3.254, резервный, метрика 100)
!   wg0  — wireguard-туннель к цод   (10.13.13.1)
!
! логика failover:
!   при доступном 4g трафик идёт через eth0 (метрика 10 < 100)
!   при падении 4g zebra убирает маршрут через eth0, остаётся маршрут через eth1

frr version 9.1.1
frr defaults traditional
hostname frr-branch
log syslog informational
service integrated-vtysh-config

! интерфейсы

interface eth0
 description "4g uplink (основной канал)"
 ip address 10.0.2.1/24
!

interface eth1
 description "спутниковый uplink (резервный канал)"
 ip address 10.0.3.1/24
!

interface wg0
 description "wireguard туннель к цод"
 ip address 10.13.13.2/24
!

interface lo
 ip address 127.0.0.1/8
!

! ip-форвардинг и статические маршруты

ip forwarding

! маршрут к цод через 4g — основной (метрика 10)
! nexthop-vrf позволяет zebra автоматически убирать маршрут если 4g упал
ip route 10.0.1.0/24 10.0.2.254 10

! маршрут к цод через спутник — резервный (метрика 100)
ip route 10.0.1.0/24 10.0.3.254 100

! маршрут в интернет через 4g
ip route 0.0.0.0/0 10.0.2.254 10

! маршрут в интернет через спутник (резерв)
ip route 0.0.0.0/0 10.0.3.254 100

! отслеживание доступности nexthop через bfd
! bfd позволяет детектировать падение линка за < 1 сек

bfd
 peer 10.0.2.254 interface eth0
  receive-interval 300
  transmit-interval 300
  detect-multiplier 3
  no shutdown
 !
 peer 10.0.3.254 interface eth1
  receive-interval 1000
  transmit-interval 1000
  detect-multiplier 3
  no shutdown
 !
!

! pbr (policy-based routing) — разделение трафика по типу
! iot-трафик (dscp cs6/48) и cctv-трафик (dscp af41/34) 
! получают приоритет при выборе маршрута

pbr-map PRIORITY-TRAFFIC seq 10
 match dscp 48
 set nexthop 10.0.2.254
!

pbr-map PRIORITY-TRAFFIC seq 20
 match dscp 34
 set nexthop 10.0.2.254
!

interface eth0
 pbr-policy PRIORITY-TRAFFIC
!

! zebra основной демон маршрутизации

line vty
!