# wireguard/wg0.conf сторона цод
# этот файл генерируется автоматически linuxserver/wireguard при первом запуске
# и сохраняется в ./wireguard/wg0.conf
# здесь показан пример ручной конфигурации если нужно без auto-генерации

[Interface]
# адрес цод-стороны туннеля
Address = 10.13.13.1/24

# порт на котором wireguard слушает udp
ListenPort = 51820

# приватный ключ генерируется через: wg genkey
# заменить на реальный перед деплоем
PrivateKey = REPLACE_WITH_REAL_PRIVATE_KEY_DATACENTER

# включаем форвардинг — цод-сторона маршрутизирует трафик в 10.0.1.0/24
PostUp   = iptables -A FORWARD -i wg0 -j ACCEPT; \
           iptables -A FORWARD -o wg0 -j ACCEPT; \
           iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE; \
           ip rule add from 10.13.13.0/24 table 200; \
           ip route add default via 10.0.1.1 table 200

PostDown = iptables -D FORWARD -i wg0 -j ACCEPT; \
           iptables -D FORWARD -o wg0 -j ACCEPT; \
           iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE

# MTU специально уменьшен чтобы избежать фрагментации поверх 4g/спутника
MTU = 1380

# peer: frr-router филиала
[Peer]
# публичный ключ филиала: wg pubkey < private_key_branch
PublicKey = REPLACE_WITH_REAL_PUBLIC_KEY_BRANCH

# разрешённые подсети: туннельный адрес + вся сеть филиала
AllowedIPs = 10.13.13.2/32, 10.0.2.0/24

# keepalive важен для nat-traversal через 4g (nat-таймауты ~ 30 сек)
PersistentKeepalive = 25