# iot/mosquitto.conf
# mqtt-брокер симулирует приём данных от iot-датчиков фермы
# слушает на 1883/tcp, без аутентификации (учебный стенд)
# логи идут в stdout — их забирает docker logs

# persistence отключена: нам не нужно копить сообщения между перезапусками
persistence false

# куда писать журнал
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# слушатель для клиентов (датчики, симулятор) из сети branch
listener 1883 0.0.0.0
protocol mqtt

# в учебном стенде не настраиваем acl/пароли
allow_anonymous true

# ограничения на размер сообщения и количество соединений (защита от шторма от датчиков)
max_connections -1
max_inflight_messages 50
max_queued_messages 1000

# keepalive — при разрыве линка 4g брокер быстрее заметит отвалившегося клиента
# и метрика числа подключений в prometheus станет точнее
max_keepalive 120
